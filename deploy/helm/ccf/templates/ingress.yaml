{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ccf.fullname" . }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className | quote }}
spec:
  {{- if .Values.ingress.tls.enabled }}
  tls:
    {{- range .Values.ingress.tls.hosts }}
    - hosts:
        - {{ .host }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.hosts.frontend }}
      http:
        paths:
          - path: {{ .Values.ingress.paths.frontend }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "ccf.fullname" . }}-frontend
                port:
                  number: {{ .Values.frontend.service.port }}
    - host: {{ .Values.ingress.hosts.backend }}
      http:
        paths:
          - path: {{ .Values.ingress.paths.backend }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "ccf.fullname" . }}-backend
                port:
                  number: {{ .Values.backend.service.port }}
{{- end }}
