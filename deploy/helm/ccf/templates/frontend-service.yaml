apiVersion: v1
kind: Service
metadata:
  name: {{ include "ccf.fullname" . }}-frontend
  labels:
    app.kubernetes.io/name: {{ include "ccf.name" . }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "ccf.name" . }}
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: 3000
