apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ccf.fullname" . }}-migrate
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ccf.name" . | quote }}
        app.kubernetes.io/component: backend-migration
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.global.imagePullSecrets | indent 8 }}
      {{- end }}
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: {{ .Values.backend.image | quote }}
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
            {{- $secretName := .Values.backend.secrets.existingSecret }}
            {{- if .Values.backend.secrets.create }}
            {{- $secretName = printf "%s-backend-secrets" (include "ccf.fullname" .) }}
            {{- end }}
            {{- if $secretName }}
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName | quote }}
                  key: {{ .Values.backend.secrets.secretKeyKey | quote }}
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName | quote }}
                  key: {{ .Values.backend.secrets.encryptionKeyKey | quote }}
                  optional: true
            {{- end }}
