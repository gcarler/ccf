apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-backend" (include "ccf.fullname" .) | quote }}
  labels:
    app.kubernetes.io/name: {{ include "ccf.name" . | quote }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ccf.name" . | quote }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "ccf.name" . | quote }}
        app.kubernetes.io/component: backend
    spec:
      {{- if .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml .Values.global.imagePullSecrets | indent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ .Values.backend.image | quote }}
          imagePullPolicy: IfNotPresent
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: "{{ $value }}"
            {{- end }}
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/system/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
