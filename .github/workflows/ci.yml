name: CCF CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ccf_test"
  TEST_DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/ccf_test"

jobs:
  # ── Quality Gate ─────────────────────────────────────────────
  backend-quality:
    name: Backend Quality Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ccf_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov bandit ruff

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Lint with Ruff
        run: ruff check backend/ --select=E,W,F,I

      - name: Security scan with Bandit
        run: bandit -r backend/ -f json -o bandit-report.json || true

      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy backend/ --ignore-missing-imports || true

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          TEST_DATABASE_URL: ${{ env.TEST_DATABASE_URL }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Check coverage threshold
        run: |
          COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree=ET.parse('coverage.xml'); root=tree.getroot(); rate=float(root.get('line-rate')); print(f'{rate*100:.1f}')")
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "❌ Coverage below 70% threshold"
            exit 1
          fi

  # ── Frontend Quality Gate ────────────────────────────────────
  frontend-quality:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint (ESLint)
        run: cd frontend && npm run lint || true

      - name: Type check (TypeScript)
        run: cd frontend && npx tsc --noEmit || true

      - name: Build
        run: cd frontend && npm run build

  # ── Database Migrations Check ────────────────────────────────
  migrations-check:
    name: Migrations Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ccf_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify migrations apply cleanly
        run: |
          cd backend && alembic upgrade head
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Verify downgrade works
        run: |
          cd backend && alembic downgrade base
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Verify upgrade again
        run: |
          cd backend && alembic upgrade head
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

  # ── Deploy to Staging ────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: [backend-quality, frontend-quality, migrations-check]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: echo "🚀 Deploy to staging would run here"
        # Add your staging deploy script here

  # ── Deploy to Production ─────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    needs: [backend-quality, frontend-quality, migrations-check]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: echo "🚀 Deploy to production would run here"
        # Add your production deploy script here
