name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: ${{ vars.CI_TEST_SECRET_KEY || 'ci-test-only-key' }}
      REDIS_URL: redis://localhost:6379/0
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files
      - name: Run tests
        run: pytest
      - name: Run alembic migrations (sqlite)
        run: alembic upgrade head

  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run critical lint gate
        run: npm run lint:critical
      - name: Run TypeScript check
        run: npm run typecheck
      - name: Run strict lint check
        run: npm run lint:strict
      - name: Build frontend
        run: npm run build
      - name: Run unit tests
        run: npm run test
      - name: Build Storybook
        run: npm run build-storybook
      - name: Run performance and compliance quality gate
        run: npm run quality:gate
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: npm run test:e2e
      - name: Run Playwright authenticated tests
        if: ${{ secrets.E2E_EMAIL != '' && secrets.E2E_PASSWORD != '' && secrets.E2E_API_URL != '' }}
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.E2E_API_URL }}
        run: npm run test:e2e:seed-user && npm run test:e2e:auth
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
      - name: Upload Storybook static build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: frontend/storybook-static
          if-no-files-found: ignore
