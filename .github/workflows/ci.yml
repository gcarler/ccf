name: CI

on:
  push:
    branches: ["main", "master", "feat/**", "fix/**"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "alembic/**"
      - ".github/workflows/**"
      - "alembic.ini"
      - "requirements.txt"
      - "pytest.ini"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/**"
      - "tests/**"
      - "alembic/**"
      - ".github/workflows/**"
      - "alembic.ini"
      - "requirements.txt"
      - "pytest.ini"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ccf_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ccf_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/ccf_test
      SECRET_KEY: ${{ vars.CI_TEST_SECRET_KEY || 'ci-test-only-key' }}
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pre-commit pytest-cov
      - name: Run pre-commit
        run: pre-commit run --all-files
      - name: Run alembic migrations
        run: alembic upgrade head
      - name: Run tests with coverage (min 70%)
        run: pytest --cov=backend --cov-report=term-missing --cov-fail-under=70 -v

  backend-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ccf_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ccf_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/ccf_test
      SECRET_KEY: ${{ vars.CI_TEST_SECRET_KEY || 'ci-test-only-key' }}
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run alembic migrations
        run: python -m alembic upgrade head
      - name: Run Evangelism integrity audit
        run: python scripts/qa_evangelism_integrity.py

  backend-evangelism-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ccf_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ccf_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@localhost:5432/ccf_test
      SECRET_KEY: ${{ vars.CI_TEST_SECRET_KEY || 'ci-test-only-key' }}
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run alembic migrations
        run: python -m alembic upgrade head
      - name: Run evangelism backend tests (fast feedback)
        run: pytest tests/test_crm_api.py -k evangelism -q

  backend-security:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ../requirements.txt
      - name: Check for hardcoded secrets in production config
        run: |
          if grep -q "admin123\|change-me\|replace-me" core/config.py; then
            echo "❌ CRITICAL: Default secrets found in config.py"
            exit 1
          fi
          echo "✅ No default secrets in config.py"
      - name: Check security tests (production rejects insecure defaults)
        run: |
          pip install pydantic pydantic-settings
          python -m pytest ../tests/test_security_config.py -v --noconftest
      - name: Run pip-audit (check for known vulnerabilities)
        run: |
          pip install pip-audit
          pip-audit --require-hashes 2>/dev/null || pip-audit --skip-editable

  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Run critical lint gate (ESLint CLI)
        run: npm run lint:critical
      - name: Run TypeScript check
        run: npm run typecheck
      - name: Run strict lint check (ESLint CLI)
        run: npm run lint:strict
      - name: Build frontend
        run: npm run build
      - name: Run unit tests with coverage
        run: npx vitest run --coverage
      - name: Run npm audit (check for known vulnerabilities)
        run: npm audit --audit-level=moderate || true
      - name: Build Storybook
        run: npm run build-storybook
      - name: Run performance and compliance quality gate
        run: npm run quality:gate
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: npm run test:e2e
      - name: Run Playwright authenticated tests (mandatory)
        env:
          E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_API_URL: ${{ secrets.E2E_API_URL }}
          NEXT_PUBLIC_API_URL: ${{ secrets.E2E_API_URL }}
          E2E_EXPECT_EVANGELISM_RESTRICTED: "1"
        run: npm run test:e2e:seed-user && npm run test:e2e:auth
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore
      - name: Upload Storybook static build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: frontend/storybook-static
          if-no-files-found: ignore
