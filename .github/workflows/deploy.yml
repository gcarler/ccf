name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even without deploy-relevant file changes"
        required: false
        default: "false"
      target:
        description: "Deploy target"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}-${{ github.event.inputs.target || 'staging' }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  changes:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.filter.outputs.should_deploy }}
    steps:
      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Detect deploy-relevant changes
        id: filter
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_deploy || 'false' }}" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual force deploy requested."
            exit 0
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Workflow_run successful on protected branch: deploy enabled to avoid false negatives in multi-commit pushes."
            exit 0
          fi
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "Manual dispatch without force flag still enables deploy by default."

  docker:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && needs.changes.outputs.should_deploy == 'true' }}
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend.Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ env.COMMIT_SHA }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.COMMIT_SHA }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy-staging:
    needs: [changes, docker]
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && needs.changes.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: staging
    outputs:
      smoke_passed: ${{ steps.smoke.outputs.smoke_passed }}
      deploy_result: ${{ job.status }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.3

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Load kubeconfig
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "KUBE_CONFIG secret is empty."
            exit 1
          fi
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          test -s ~/.kube/config

      - name: Cluster preflight
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl auth can-i get pods -n ccf
          if kubectl get namespace ccf >/dev/null 2>&1; then
            echo "Namespace ccf exists."
          else
            echo "Namespace ccf does not exist yet; Helm will create it."
          fi

      - name: Pre-deploy database backup
        id: backup
        continue-on-error: true
        run: |
          set -euo pipefail
          BACKUP_FILE="/tmp/ccf_backup_$(date +%Y%m%d_%H%M%S).sql"

          # Try to find a postgres pod in the ccf namespace
          PG_POD=$(kubectl get pods -n ccf -o name 2>/dev/null | grep -m 1 'pod/.*postgres' || echo "")
          if [ -z "$PG_POD" ]; then
            # Try in default namespace
            PG_POD=$(kubectl get pods -o name 2>/dev/null | grep -m 1 'pod/.*postgres' || echo "")
          fi

          if [ -n "$PG_POD" ]; then
            echo "Found postgres pod: $PG_POD"
            PG_POD_NAME="${PG_POD#pod/}"

            # Get DB creds from pod env or use defaults
            PG_USER=$(kubectl exec "$PG_POD_NAME" -n ccf -- printenv POSTGRES_USER 2>/dev/null || echo "postgres")
            PG_DB=$(kubectl exec "$PG_POD_NAME" -n ccf -- printenv POSTGRES_DB 2>/dev/null || echo "ccf_db")
            PG_NS=$(kubectl get pod "$PG_POD_NAME" -o jsonpath='{.metadata.namespace}' 2>/dev/null || echo "ccf")

            kubectl exec "$PG_POD_NAME" -n "$PG_NS" -- pg_dump -U "$PG_USER" -d "$PG_DB" --clean --if-exists > "$BACKUP_FILE" 2>&1 || {
              echo "::warning::pg_dump failed, continuing without backup"
              exit 0
            }
            echo "Backup created: $BACKUP_FILE ($(wc -c < "$BACKUP_FILE") bytes)"
            echo "backup_file=$BACKUP_FILE" >> "$GITHUB_OUTPUT"
            echo "backup_success=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::No postgres pod found in cluster — skipping backup."
            echo "::notice::Set POSTGRES_BACKUP_POD secret to specify the pod name."
            echo "backup_success=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload backup artifact
        if: steps.backup.outputs.backup_success == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ccf-db-backup
          path: ${{ steps.backup.outputs.backup_file }}
          retention-days: 7
          if-no-files-found: ignore

      - name: Helm upgrade
        run: |
          set -euo pipefail
          extra_args="${{ secrets.HELM_EXTRA_ARGS }}"
          if [ -n "${extra_args}" ]; then
            if echo "${extra_args}" | grep -Eq '[;&|`$()<>]'; then
              echo "HELM_EXTRA_ARGS contains forbidden shell metacharacters."
              exit 1
            fi
          fi
          HELM_EXTRA_ARGS_ARRAY=()
          if [ -n "${extra_args}" ]; then
            read -r -a HELM_EXTRA_ARGS_ARRAY <<< "${extra_args}"
          fi
          helm upgrade --install ccf ./deploy/helm/ccf \
            --namespace ccf --create-namespace \
            --atomic --wait --timeout 10m \
            --set backend.image=${{ env.IMAGE_BACKEND }}:${{ env.COMMIT_SHA }} \
            --set frontend.image=${{ env.IMAGE_FRONTEND }}:${{ env.COMMIT_SHA }} \
            "${HELM_EXTRA_ARGS_ARRAY[@]}"

      - name: Verify rollout status
        run: |
          kubectl rollout status deployment/ccf-ccf-backend -n ccf --timeout=300s
          kubectl rollout status deployment/ccf-ccf-frontend -n ccf --timeout=300s

      - name: Post-deploy smoke test
        id: smoke
        run: |
          set -euo pipefail
          echo "::group::Smoke tests"

          # Port-forward backend and frontend for testing
          kubectl port-forward svc/ccf-ccf-backend 8090:8000 -n ccf &
          PF_BACKEND=$!
          kubectl port-forward svc/ccf-ccf-frontend 3090:3000 -n ccf &
          PF_FRONTEND=$!
          sleep 5

          # Cleanup on exit
          cleanup() {
            kill $PF_BACKEND $PF_FRONTEND 2>/dev/null || true
            wait $PF_BACKEND $PF_FRONTEND 2>/dev/null || true
          }
          trap cleanup EXIT

          FAILURES=0

          echo ""
          echo "--- Backend health check ---"
          if curl -fsS -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:8090/api/system/health 2>/dev/null | grep -q "200"; then
            echo "  PASS  GET /api/system/health → 200"
          else
            echo "  FAIL  GET /api/system/health"
            FAILURES=$((FAILURES + 1))
          fi

          echo ""
          echo "--- Backend API probes ---"
          AUTH_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:8090/api/auth/me 2>/dev/null || echo "000")
          if [ "$AUTH_CODE" = "401" ] || [ "$AUTH_CODE" = "403" ]; then
            echo "  PASS  GET /api/auth/me → $AUTH_CODE (auth gate active)"
          else
            echo "  WARN  GET /api/auth/me → $AUTH_CODE (expected 401)"
          fi

          DOCS_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:8090/docs 2>/dev/null || echo "000")
          if [ "$DOCS_CODE" = "200" ]; then
            echo "  PASS  GET /docs → 200"
          else
            echo "  WARN  GET /docs → $DOCS_CODE"
          fi

          echo ""
          echo "--- Frontend probe ---"
          FRONTEND_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 http://localhost:3090/ 2>/dev/null || echo "000")
          if [ "$FRONTEND_CODE" = "200" ] || [ "$FRONTEND_CODE" = "304" ]; then
            echo "  PASS  GET / → $FRONTEND_CODE"
          else
            echo "  FAIL  GET / → $FRONTEND_CODE"
            FAILURES=$((FAILURES + 1))
          fi

          echo ""
          echo "::endgroup::"

          if [ $FAILURES -gt 0 ]; then
            echo "::error::$FAILURES smoke test(s) failed"
            echo "smoke_passed=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi

          echo "::notice::All smoke tests passed"
          echo "smoke_passed=true" >> "$GITHUB_OUTPUT"

  notify:
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Prepare notification payload
        id: notify
        env:
          DEPLOY_OUTCOME: ${{ needs.deploy.result }}
          SMOKE_PASSED: ${{ needs.deploy.outputs.smoke_passed }}
        run: |
          COMMIT_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          COMMIT_SHA_SHORT="${COMMIT_SHA:0:7}"
          COMMIT_MSG="${{ github.event.workflow_run.head_commit.message || github.event.head_commit.message || 'Manual deploy' }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            COLOR="good"
            STATUS_EMOJI=":white_check_mark:"
            STATUS_TEXT="Deploy exitoso"
          elif [ "$DEPLOY_OUTCOME" = "skipped" ]; then
            COLOR="warning"
            STATUS_EMOJI=":warning:"
            STATUS_TEXT="Deploy saltado"
          else
            COLOR="danger"
            STATUS_EMOJI=":x:"
            STATUS_TEXT="Deploy fallido"
          fi

          # Determine smoke test result text
          if [ "${SMOKE_PASSED}" = "true" ]; then
            SMOKE_LABEL="PASSED"
          elif [ -z "${SMOKE_PASSED}" ]; then
            SMOKE_LABEL="N/A"
          else
            SMOKE_LABEL="FAILED"
          fi

          # Truncate commit message to 120 chars
          COMMIT_MSG_TRUNC="${COMMIT_MSG:0:120}"

          PAYLOAD=$(cat << JSON
          {
            "attachments": [
              {
                "color": "${COLOR}",
                "pretext": "${STATUS_EMOJI} ${STATUS_TEXT} — CCF Platform",
                "fields": [
                  {"title": "Commit", "value": "<${RUN_URL}|${COMMIT_SHA_SHORT}> — ${COMMIT_MSG_TRUNC}", "short": false},
                  {"title": "Branch", "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Smoke Test", "value": "${SMOKE_LABEL}", "short": true}
                ],
                "footer": "CCF Deploy Pipeline",
                "ts": $(date +%s)
              }
            ]
          }
          JSON
          )
          echo "payload<<EOF" >> "$GITHUB_OUTPUT"
          echo "$PAYLOAD" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send deploy notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "${SLACK_WEBHOOK_URL}" ]; then
            echo "::notice::SLACK_WEBHOOK_URL not configured — skipping notification."
            echo "::notice::Set it in GitHub Secrets → Settings > Secrets and variables > Actions > SLACK_WEBHOOK_URL"
            exit 0
          fi
          curl -sS -X POST -H "Content-Type: application/json" \
            -d '${{ steps.notify.outputs.payload }}' \
            "${SLACK_WEBHOOK_URL}"
          echo "::notice::Notification sent to Slack."

  deploy-production:
    needs: [changes, docker, deploy-staging]
    if: ${{ needs.deploy-staging.outputs.smoke_passed == 'true' && (github.event.inputs.target == 'production' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: production  # manual approval gate
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.3

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Load kubeconfig
        run: |
          set -euo pipefail
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          test -s ~/.kube/config

      - name: Pre-deploy database backup
        run: |
          set -euo pipefail
          PG_POD=$(kubectl get pods -n ccf -o name 2>/dev/null | grep -m 1 'pod/.*postgres' || echo "")
          if [ -n "$PG_POD" ]; then
            PG_POD_NAME="${PG_POD#pod/}"
            PG_USER=$(kubectl exec "$PG_POD_NAME" -n ccf -- printenv POSTGRES_USER 2>/dev/null || echo "postgres")
            PG_DB=$(kubectl exec "$PG_POD_NAME" -n ccf -- printenv POSTGRES_DB 2>/dev/null || echo "ccf_db")
            kubectl exec "$PG_POD_NAME" -n ccf -- pg_dump -U "$PG_USER" -d "$PG_DB" --clean --if-exists > "/tmp/ccf_prod_backup_$(date +%Y%m%d_%H%M%S).sql" || echo "::warning::pg_dump failed"
          fi

      - name: Helm upgrade (production namespace)
        run: |
          set -euo pipefail
          helm upgrade --install ccf ./deploy/helm/ccf \
            --namespace ccf-production --create-namespace \
            --atomic --wait --timeout 10m \
            --set backend.image=${{ env.IMAGE_BACKEND }}:${{ env.COMMIT_SHA }} \
            --set frontend.image=${{ env.IMAGE_FRONTEND }}:${{ env.COMMIT_SHA }} \
            --set environment=production

      - name: Verify rollout status
        run: |
          kubectl rollout status deployment/ccf-ccf-backend -n ccf-production --timeout=300s
          kubectl rollout status deployment/ccf-ccf-frontend -n ccf-production --timeout=300s

      - name: Post-deploy smoke test
        run: |
          set -euo pipefail
          kubectl port-forward svc/ccf-ccf-backend 8090:8000 -n ccf-production &
          PF_BACKEND=$!
          sleep 5
          trap "kill $PF_BACKEND 2>/dev/null" EXIT
          curl -fsS --max-time 10 http://localhost:8090/healthz || exit 1
