name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even without deploy-relevant file changes"
        required: false
        default: "false"

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend
  COMMIT_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  changes:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_deploy: ${{ steps.filter.outputs.should_deploy }}
    steps:
      - name: Checkout commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}
          fetch-depth: 0

      - name: Detect deploy-relevant changes
        id: filter
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force_deploy || 'false' }}" = "true" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual force deploy requested."
            exit 0
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_run" ]; then
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Workflow_run successful on protected branch: deploy enabled to avoid false negatives in multi-commit pushes."
            exit 0
          fi
          echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          echo "Manual dispatch without force flag still enables deploy by default."

  docker:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && needs.changes.outputs.should_deploy == 'true' }}
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend.Dockerfile
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:${{ env.COMMIT_SHA }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:${{ env.COMMIT_SHA }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    needs: [changes, docker]
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success') && needs.changes.outputs.should_deploy == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.3

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Load kubeconfig
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.KUBE_CONFIG }}" ]; then
            echo "KUBE_CONFIG secret is empty."
            exit 1
          fi
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          test -s ~/.kube/config

      - name: Cluster preflight
        run: |
          set -euo pipefail
          kubectl cluster-info
          kubectl auth can-i get pods -n ccf
          if kubectl get namespace ccf >/dev/null 2>&1; then
            echo "Namespace ccf exists."
          else
            echo "Namespace ccf does not exist yet; Helm will create it."
          fi

      - name: Helm upgrade
        run: |
          set -euo pipefail
          extra_args="${{ secrets.HELM_EXTRA_ARGS }}"
          if [ -n "${extra_args}" ]; then
            if echo "${extra_args}" | grep -Eq '[;&|`$()<>]'; then
              echo "HELM_EXTRA_ARGS contains forbidden shell metacharacters."
              exit 1
            fi
          fi
          HELM_EXTRA_ARGS_ARRAY=()
          if [ -n "${extra_args}" ]; then
            read -r -a HELM_EXTRA_ARGS_ARRAY <<< "${extra_args}"
          fi
          helm upgrade --install ccf ./deploy/helm/ccf \
            --namespace ccf --create-namespace \
            --atomic --wait --timeout 10m \
            --set backend.image=${{ env.IMAGE_BACKEND }}:${{ env.COMMIT_SHA }} \
            --set frontend.image=${{ env.IMAGE_FRONTEND }}:${{ env.COMMIT_SHA }} \
            "${HELM_EXTRA_ARGS_ARRAY[@]}"

      - name: Verify rollout status
        run: |
          kubectl rollout status deployment/ccf-ccf-backend -n ccf --timeout=300s
          kubectl rollout status deployment/ccf-ccf-frontend -n ccf --timeout=300s
