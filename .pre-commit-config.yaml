# Pre-commit hooks for CCF Platform
# Install: pip install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: ["--select=E,W,F,I", "--fix"]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args: ["-r", "backend/", "-ll", "-s", "B314,B324,B608"]
        exclude: tests/
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest-smoke
        name: Run smoke tests
        entry: pytest tests/test_smoke.py -q --no-cov
        language: system
        types: [python]
        pass_filenames: false
        always_run: true

      - id: test-reglas
        name: Run platform rules tests
        entry: pytest tests/test_reglas_plataforma.py -q --no-cov
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
