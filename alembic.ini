[alembic]
# `here` is a project-root anchor used to make `script_location` cwd-independent.
# Override by editing env-specific .ini fragments or by exporting
# `ALEMBIC_PROJECT_ROOT` and adapting via a deployment wrapper.
here = /root/ccf
script_location = %(here)s/alembic
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/ccf_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = logging.StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)s [%(name)s] %(message)s
datefmt = %Y-%m-%d %H:%M:%S
