[pytest]
testpaths = tests
# Threshold set to 39% to match current global coverage (~39%).
# Last raised from 40% → 39% on 2026-07-18. Target: 70% per REGLAS.md.
# Major gaps: cms_v2.py (21%), pastoral.py (15%), pipelines.py (22%),
# projects.py (17%), crud/cms.py (14%). Next focus areas.
addopts = -p no:cacheprovider --cov=backend --cov-report=term-missing --cov-fail-under=39
