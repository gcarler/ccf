<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1973f0",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101822",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Lexend', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-primary/10">
<div class="flex items-center justify-between px-4 h-16">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back_ios</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Crear Nuevo Curso</h1>
<button class="text-primary font-semibold text-sm px-3 py-2 rounded-lg hover:bg-primary/10">Guardar</button>
</div>
</header>
<main class="max-w-md mx-auto pb-24">
<!-- Thumbnail Upload Section -->
<div class="p-4">
<p class="text-sm font-semibold text-slate-500 dark:text-slate-400 mb-3 uppercase tracking-wider">Imagen de Portada</p>
<div class="relative group cursor-pointer">
<div class="w-full aspect-video rounded-xl border-2 border-dashed border-primary/30 bg-primary/5 flex flex-col items-center justify-center gap-2 hover:border-primary hover:bg-primary/10 transition-all">
<span class="material-symbols-outlined text-primary text-4xl">add_a_photo</span>
<p class="text-primary font-medium">Cargar Miniatura</p>
<p class="text-xs text-slate-400">Recomendado: 1280x720px</p>
</div>
<!-- Background decorative pattern if no image -->
<div class="hidden absolute inset-0 opacity-10 pointer-events-none" data-alt="Abstract blue geometric pattern for course background"></div>
</div>
</div>
<!-- General Info Form -->
<div class="px-4 space-y-5">
<h3 class="text-lg font-bold pt-2">Información General</h3>
<div class="space-y-4">
<label class="block">
<span class="text-sm font-medium mb-1.5 block text-slate-700 dark:text-slate-300">Título del Curso</span>
<input class="w-full h-14 px-4 rounded-xl border border-primary/20 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" placeholder="Ej. Fundamentos de la Fe" type="text"/>
</label>
<label class="block">
<span class="text-sm font-medium mb-1.5 block text-slate-700 dark:text-slate-300">Descripción</span>
<textarea class="w-full p-4 rounded-xl border border-primary/20 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400 resize-none" placeholder="Describe los objetivos y el propósito de este curso para la congregación..." rows="4"></textarea>
</label>
<label class="block">
<span class="text-sm font-medium mb-1.5 block text-slate-700 dark:text-slate-300">Categoría</span>
<div class="relative">
<select class="w-full h-14 px-4 pr-10 rounded-xl border border-primary/20 bg-white dark:bg-slate-900 focus:ring-2 focus:ring-primary focus:border-transparent outline-none appearance-none transition-all">
<option value="">Seleccionar categoría</option>
<option value="biblia">Estudios Bíblicos</option>
<option value="liderazgo">Liderazgo Cristiano</option>
<option value="vida">Vida Victoriosa</option>
<option value="jovenes">Ministerio Juvenil</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
</div>
</label>
</div>
</div>
<!-- Lessons Section -->
<div class="px-4 mt-8">
<div class="flex items-center justify-between mb-4">
<h3 class="text-lg font-bold">Añadir Lecciones</h3>
<span class="text-sm text-primary font-medium">0 Lecciones</span>
</div>
<div class="space-y-3">
<!-- Empty State for Lessons -->
<div class="bg-primary/5 border border-primary/10 rounded-xl p-6 flex flex-col items-center text-center">
<div class="size-12 rounded-full bg-primary/10 flex items-center justify-center mb-3">
<span class="material-symbols-outlined text-primary">format_list_bulleted</span>
</div>
<p class="text-sm text-slate-600 dark:text-slate-400 mb-4">Aún no has añadido contenido a este curso.</p>
<button class="flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-full font-semibold shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">add</span>
<span>Añadir Primera Lección</span>
</button>
</div>
</div>
</div>
</main>
<!-- Bottom Action Button (Fixed) -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md border-t border-primary/10 max-w-md mx-auto">
<div class="flex gap-3">
<button class="flex-1 h-12 rounded-xl border border-primary text-primary font-bold hover:bg-primary/5 transition-colors">
                Borrador
            </button>
<button class="flex-[2] h-12 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/25 hover:brightness-110 active:scale-[0.99] transition-all">
                Publicar Curso
            </button>
</div>
</div>
</body></html>
