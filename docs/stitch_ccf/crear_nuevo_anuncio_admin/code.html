<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Crear Nuevo Anuncio - Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4242f0",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gradient-to-b from-white to-[#eef2ff] min-h-screen text-slate-900 font-display">
<!-- Top Navigation Bar -->
<div class="sticky top-0 z-50 glass-panel border-b border-primary/10 px-4 py-4 flex items-center justify-between">
<div class="flex items-center gap-3">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 text-slate-900 transition-colors">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<h1 class="text-xl font-bold tracking-tight text-slate-900">Nuevo Anuncio</h1>
</div>
<button class="text-primary font-semibold text-sm px-3 py-1 hover:bg-primary/5 rounded-lg transition-colors">
            Limpiar
        </button>
</div>
<main class="max-w-md mx-auto p-4 space-y-6 pb-24">
<!-- Header Section -->
<div>
<h2 class="text-2xl font-bold text-slate-900">Crear Comunicado</h2>
<p class="text-slate-500 text-sm mt-1">Completa los detalles para notificar a la congregación.</p>
</div>
<!-- Image Upload Area -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 ml-1">Imagen Destacada</label>
<div class="relative group">
<div class="w-full h-48 rounded-xl border-2 border-dashed border-primary/30 bg-primary/5 flex flex-col items-center justify-center text-center p-6 transition-all group-hover:border-primary group-hover:bg-primary/10 cursor-pointer">
<span class="material-symbols-outlined text-primary text-4xl mb-2">add_photo_alternate</span>
<p class="text-sm font-medium text-slate-700">Toca para cargar imagen</p>
<p class="text-xs text-slate-400 mt-1">JPG, PNG o WEBP (Máx. 5MB)</p>
</div>
<input class="absolute inset-0 opacity-0 cursor-pointer" type="file"/>
</div>
</div>
<!-- Form Fields -->
<div class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 ml-1">Título del Anuncio</label>
<input class="w-full px-4 py-3.5 rounded-xl border-primary/20 bg-white shadow-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-slate-400" placeholder="Ej: Gran Vigilia de Oración" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 ml-1">Fecha de Publicación</label>
<div class="relative">
<input class="w-full px-4 py-3.5 rounded-xl border-primary/20 bg-white shadow-sm focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all appearance-none" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">calendar_today</span>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 ml-1">Contenido del Mensaje</label>
<div class="rounded-xl border border-primary/20 bg-white shadow-sm overflow-hidden">
<div class="flex items-center gap-1 p-2 border-b border-primary/10 bg-slate-50">
<button class="p-1.5 rounded hover:bg-white text-slate-600"><span class="material-symbols-outlined text-sm">format_bold</span></button>
<button class="p-1.5 rounded hover:bg-white text-slate-600"><span class="material-symbols-outlined text-sm">format_italic</span></button>
<button class="p-1.5 rounded hover:bg-white text-slate-600"><span class="material-symbols-outlined text-sm">format_list_bulleted</span></button>
<div class="w-px h-4 bg-slate-300 mx-1"></div>
<button class="p-1.5 rounded hover:bg-white text-slate-600"><span class="material-symbols-outlined text-sm">link</span></button>
</div>
<textarea class="w-full border-none focus:ring-0 p-4 text-slate-700 placeholder:text-slate-400 resize-none" placeholder="Escribe el cuerpo del anuncio aquí..." rows="6"></textarea>
</div>
</div>
</div>
<!-- Settings Section -->
<div class="glass-panel rounded-2xl p-4 space-y-4 border border-primary/10 shadow-sm">
<div class="flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">notifications_active</span>
</div>
<div>
<p class="font-semibold text-slate-800">Notificación Push</p>
<p class="text-xs text-slate-500">Alertar a todos los usuarios</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
</main>
<!-- Bottom Action Bar -->
<div class="fixed bottom-0 left-0 right-0 p-4 pb-8 glass-panel border-t border-primary/10 flex gap-3 max-w-md mx-auto">
<button class="flex-1 py-4 px-6 rounded-xl border border-primary/20 font-semibold text-primary bg-white hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">visibility</span>
            Vista Previa
        </button>
<button class="flex-[1.5] py-4 px-6 rounded-xl bg-primary font-bold text-white shadow-lg shadow-primary/30 hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">send</span>
            Publicar
        </button>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl opacity-50 -translate-y-1/2 translate-x-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-96 h-96 bg-primary/10 rounded-full blur-3xl opacity-30 translate-y-1/2 -translate-x-1/2"></div>
</body></html>
