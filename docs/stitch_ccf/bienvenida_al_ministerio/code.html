<!DOCTYPE html>

<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#4242f0",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: rgba(28, 28, 39, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden">
<!-- Background Image with Blue Overlay -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-b from-background-dark/40 via-background-dark/60 to-background-dark z-10"></div>
<div class="absolute inset-0 bg-primary/20 z-10"></div>
<img alt="Modern worship service background" class="h-full w-full object-cover" data-alt="Modern church worship service with blue lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC4-PDXiWcojcW52Fsm6wJrpfZKGpZAUWfCmaWhLF6cwOihS9jxHgCYrKWFzPP2h0N_pgMkzqCXaZzYl4Cm76UzPiBA4jXqQ3Bk-BMZKq9UNAllSjV9L6EEW6sA-m0xy3QX8FI5bDe1RqkTOvZDnvUfbmuJ8OBjGkE04sAzIY0Uen6jm4ZB3xXc99u-4mDhl1oROTB65cKiKXnQFMyzFh0ObUyHIMS0gPC0xxU3DPUoLnbxQ6MmAc1F3HYTGZW276GIILdizkHuUbE"/>
</div>
<!-- Header -->
<div class="relative z-20 flex items-center justify-between p-6">
<div class="flex items-center gap-2">
<div class="bg-primary/20 p-2 rounded-lg">
<span class="material-symbols-outlined text-primary text-2xl">church</span>
</div>
<span class="font-bold tracking-tight text-xl">Ministerio</span>
</div>
<button class="flex h-10 w-10 items-center justify-center rounded-full bg-slate-100/10 backdrop-blur-md">
<span class="material-symbols-outlined text-slate-100">info</span>
</button>
</div>
<!-- Main Content -->
<div class="relative z-20 flex flex-1 flex-col justify-end px-6 pb-12">
<div class="mb-8 space-y-2 text-center">
<h1 class="text-5xl font-bold tracking-tight text-slate-100">Bienvenido <br/> a Casa</h1>
<p class="text-slate-300 text-lg">Tu familia espiritual te espera.</p>
</div>
<!-- Glassmorphism Card -->
<div class="glass-card rounded-xl p-6 mb-10">
<div class="flex flex-col gap-4">
<div class="flex items-center gap-3">
<div class="h-1 w-12 rounded-full bg-primary"></div>
<p class="text-sm font-semibold uppercase tracking-widest text-primary">Nuestra Visión</p>
</div>
<p class="text-slate-200 leading-relaxed text-base">
                        Encuentra un lugar donde pertenecer, crecer y servir. Estamos felices de acompañarte en este hermoso camino de fe y propósito.
                    </p>
</div>
</div>
<!-- Pagination Dots -->
<div class="flex w-full flex-row items-center justify-center gap-2 mb-8">
<div class="h-1.5 w-6 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-500/50"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-500/50"></div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-5 rounded-xl transition-all shadow-lg shadow-primary/25 active:scale-[0.98] flex items-center justify-center gap-2">
                Comenzar
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center mt-6 text-slate-400 text-sm">
                ¿Ya tienes una cuenta? <span class="text-primary font-semibold">Inicia sesión</span>
</p>
</div>
</div>
</body></html>
