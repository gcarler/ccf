<html class="dark"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#4242f0",
            "background-light": "#f6f6f8",
            "background-dark": "#101022",
          },
          fontFamily: {
            "display": ["Plus Jakarta Sans"]
          },
          borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    .glass-effect {
      background: rgba(66, 66, 240, 0.1);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .glow-shadow {
      box-shadow: 0 0 30px rgba(66, 66, 240, 0.4);
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: white;
      opacity: 0.2;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-dark text-slate-100 flex items-center justify-center min-h-screen">
<div class="relative flex h-[844px] w-[390px] flex-col bg-background-dark overflow-hidden shadow-2xl">
<!-- Background Effects -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[60%] h-[40%] bg-primary/20 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[20%] right-[-10%] w-[50%] h-[30%] bg-cyan-500/10 blur-[100px] rounded-full"></div>
<!-- Subtle Floating Particles -->
<div class="particle w-1 h-1 top-20 left-10"></div>
<div class="particle w-2 h-2 top-40 right-20 bg-cyan-200"></div>
<div class="particle w-1.5 h-1.5 bottom-60 left-1/4 opacity-30"></div>
<div class="particle w-1 h-1 bottom-20 right-1/3 bg-cyan-100"></div>
</div>
<!-- Header / Close -->
<div class="relative z-10 flex items-center justify-end p-6">
<button class="flex items-center justify-center size-10 rounded-full bg-slate-800/50 text-slate-100">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Hero Content -->
<div class="relative z-10 flex flex-col items-center px-6 pt-4 text-center">
<!-- Success Icon Circle -->
<div class="relative mb-8">
<div class="absolute inset-0 bg-primary/30 blur-2xl rounded-full"></div>
<div class="glass-effect size-28 rounded-full flex items-center justify-center glow-shadow border-white/20">
<span class="material-symbols-outlined text-primary !text-6xl font-bold">check_circle</span>
</div>
</div>
<h1 class="text-3xl font-extrabold leading-tight tracking-tight text-slate-100 mb-2">
        ¡Anuncio Publicado<br/>Exitosamente!
      </h1>
<p class="text-slate-400 text-base mb-10 max-w-[280px]">
        Tu mensaje ya está disponible para toda la congregación.
      </p>
<!-- Summary Card -->
<div class="w-full glass-effect rounded-2xl p-4 flex items-center gap-4 text-left border-white/5">
<div class="relative h-16 w-16 shrink-0 overflow-hidden rounded-xl bg-slate-800">
<img alt="Vista previa del anuncio" class="h-full w-full object-cover" data-alt="Modern worship background with blue lights" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCZoodpZylt-dNUkQNDP1w1RstG5jT4wW3qdGAkOscyaN7MFf-0zqfaEx8zhe_vutTuqCNJb430PsB-SDptdrkd8zNWeQLK2O2As9iv9nlk-mDo8udlyitxFB6o9OE20KxebzP9BSFG139nvL7Y0Zi8mWGg2OgTD3LJ5Ik48Ji6p8Nf7uYGfCgPhD3NCtW8sfwFnDByYf0j2uiNelETm5q8i5R9g5y_BgZRrJteuKzrCByoMaJUWIeGBZOHmdrfCz3jBAnpZIDpiuo"/>
</div>
<div class="flex flex-col overflow-hidden">
<h3 class="text-slate-100 font-bold truncate">Noche de Adoración y Milagros</h3>
<p class="text-slate-500 text-xs font-medium uppercase tracking-wider">Categoría: Eventos</p>
</div>
<div class="ml-auto">
<span class="material-symbols-outlined text-slate-500">chevron_right</span>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="mt-auto relative z-10 px-6 pb-12 flex flex-col gap-3">
<button class="bg-primary hover:bg-primary/90 text-white font-bold h-14 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">visibility</span>
<span>Ver Anuncio</span>
</button>
<button class="bg-slate-800/50 hover:bg-slate-800 text-slate-100 font-bold h-14 rounded-xl flex items-center justify-center transition-all active:scale-[0.98]">
<span>Ir al Inicio</span>
</button>
</div>
<!-- Safe Area Indicator (iOS Style) -->
<div class="h-1.5 w-32 bg-slate-700/50 rounded-full mx-auto mb-2 relative z-10"></div>
</div>
</body></html>
